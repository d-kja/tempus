name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install Dioxus CLI
        run: |
          curl -fsSL https://github.com/DioxusLabs/dioxus/releases/download/v0.7.9/dx-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin dx
          chmod +x /usr/local/bin/dx

      - name: Bump version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i "s/^version = \".*\"/version = \"$VER\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" src-tauri/tauri.conf.json

      - name: Set build version
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          VER="0.1.${{ github.run_number }}"
          sed -i "s/^version = \".*\"/version = \"$VER\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" src-tauri/tauri.conf.json

      - name: Read version
        id: version
        run: |
          VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: hours v${{ steps.version.outputs.version }}
          releaseBody: "See assets to download."
          releaseDraft: false
          prerelease: false

      - name: Upload raw binary to release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" \
            target/release/hours \
            --clobber
