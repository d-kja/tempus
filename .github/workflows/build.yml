name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.7"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v0.1.0-{0}', github.run_number) }}
          releaseName: "hours ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v0.1.0-{0}', github.run_number) }}"
          releaseBody: "See assets to download."
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          prerelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "hours-[version]-linux-x86_64"

      - name: Upload raw binary to release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v0.1.0-{0}', github.run_number) }}"
          gh release upload "$TAG" \
            src-tauri/target/release/hours \
            --clobber
